name: Angular CI

# CI geçici olarak devre dışı — Angular setup tamamlanana kadar
on:
  workflow_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./angular

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
          cache-dependency-path: angular/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./angular/coverage/**/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
