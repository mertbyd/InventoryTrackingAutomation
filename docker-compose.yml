# Local geliştirme ortamı için sadece PostgreSQL ayağa kaldırır.
# .NET uygulamaları ayrı terminallerde `dotnet run` ile çalıştırılır.
# Kullanım: docker-compose up -d

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: InventoryTrackingAutomationdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
